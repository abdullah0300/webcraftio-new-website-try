    <style>
        :root {
            --p-accent: #c8f03d;
            --p-surface: #111111;
            --p-surface2: #1a1a1a;
            --p-border: rgba(255,255,255,0.07);
            --p-muted: #6b6b6b;
            --p-text: #f0f0f0;
            --p-display: 'Syne', sans-serif;
            --p-body: 'DM Sans', sans-serif;
        }

        /* ── Loading skeleton ── */
        .p-loading {
            padding: 120px 48px 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 860px;
            margin: 0 auto;
        }
        .p-skel-line {
            background: var(--p-surface);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .p-skel-line::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            animation: pShim 1.6s infinite;
        }
        @keyframes pShim {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ── Post Hero ── */
        .p-hero {
            padding-top: 100px;
            position: relative;
            border-bottom: 1px solid var(--p-border);
        }
        .p-hero-img {
            width: 100%;
            height: clamp(300px, 45vw, 580px);
            overflow: hidden;
            position: relative;
        }
        .p-hero-img img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        .p-hero-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 40%, rgba(10,10,10,0.92) 100%);
        }
        .p-hero-content {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 0 64px 52px;
        }

        /* Hero without image */
        .p-hero-noimg {
            padding: 100px 64px 52px;
            border-bottom: 1px solid var(--p-border);
            background: var(--p-surface);
        }

        .p-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--p-display);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--p-muted);
            text-decoration: none;
            margin-bottom: 28px;
            transition: color 0.2s, gap 0.2s;
        }
        .p-back:hover { color: var(--p-accent); gap: 12px; }
        .p-back svg { transition: transform 0.2s; }
        .p-back:hover svg { transform: translateX(-3px); }

        .p-tag-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .p-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--p-display);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--p-accent);
        }
        .p-tag::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--p-accent);
        }

        .p-post-title {
            font-family: var(--p-display);
            font-size: clamp(32px, 5vw, 64px);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.0;
            color: var(--p-text);
            max-width: 900px;
            margin-bottom: 28px;
        }

        .p-meta-row {
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }
        .p-meta-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-family: var(--p-body);
            font-size: 12px;
            color: var(--p-muted);
            letter-spacing: 0.03em;
        }
        .p-meta-dot {
            width: 3px; height: 3px;
            border-radius: 50%;
            background: var(--p-muted);
        }

        /* ── Post Body ── */
        .p-body-wrap {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 64px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 72px 64px;
        }

        /* Article content */
        .p-article {
            font-family: var(--p-body);
            color: var(--p-text);
            font-size: 17px;
            line-height: 1.85;
        }
        .p-article p {
            margin-bottom: 28px;
            color: rgba(240,240,240,0.85);
        }
        .p-article h2 {
            font-family: var(--p-display);
            font-size: clamp(22px, 2.5vw, 32px);
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--p-text);
            margin: 48px 0 20px;
            line-height: 1.15;
        }
        .p-article h3 {
            font-family: var(--p-display);
            font-size: clamp(18px, 2vw, 24px);
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--p-text);
            margin: 36px 0 16px;
        }
        .p-article h4 {
            font-family: var(--p-display);
            font-size: 18px;
            font-weight: 600;
            color: var(--p-text);
            margin: 28px 0 12px;
        }
        .p-article strong {
            font-weight: 600;
            color: var(--p-text);
        }
        .p-article em { font-style: italic; color: var(--p-muted); }
        .p-article a {
            color: var(--p-accent);
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .p-article ul, .p-article ol {
            padding-left: 24px;
            margin-bottom: 28px;
        }
        .p-article li {
            margin-bottom: 10px;
            color: rgba(240,240,240,0.85);
        }
        .p-article blockquote {
            border-left: 3px solid var(--p-accent);
            margin: 36px 0;
            padding: 20px 28px;
            background: var(--p-surface);
            border-radius: 0 4px 4px 0;
        }
        .p-article blockquote p {
            font-size: 18px;
            font-style: italic;
            color: var(--p-text);
            margin: 0;
        }
        .p-article code {
            font-size: 13px;
            background: var(--p-surface2);
            border: 1px solid var(--p-border);
            padding: 2px 7px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: var(--p-accent);
        }
        .p-article pre {
            background: var(--p-surface);
            border: 1px solid var(--p-border);
            padding: 24px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 28px;
        }
        .p-article pre code {
            background: none;
            border: none;
            padding: 0;
        }
        .p-article hr {
            border: none;
            border-top: 1px solid var(--p-border);
            margin: 48px 0;
        }
        .p-article img {
            width: 100%;
            border-radius: 4px;
            margin: 32px 0;
        }

        /* Sidebar */
        .p-sidebar {
            position: sticky;
            top: 100px;
            align-self: start;
        }
        .p-sidebar-block {
            background: var(--p-surface);
            border: 1px solid var(--p-border);
            padding: 28px;
            margin-bottom: 16px;
        }
        .p-sidebar-label {
            font-family: var(--p-display);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--p-muted);
            margin-bottom: 16px;
        }
        .p-sidebar-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .p-sidebar-tag {
            font-family: var(--p-display);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 12px;
            border: 1px solid var(--p-border);
            color: var(--p-muted);
            border-radius: 100px;
        }
        .p-cta {
            background: var(--p-accent);
            padding: 28px;
        }
        .p-cta h4 {
            font-family: var(--p-display);
            font-size: 17px;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #000;
            margin-bottom: 10px;
            line-height: 1.2;
        }
        .p-cta p {
            font-family: var(--p-body);
            font-size: 12px;
            color: rgba(0,0,0,0.6);
            margin-bottom: 18px;
            line-height: 1.6;
        }
        .p-cta a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--p-display);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #000;
            text-decoration: none;
            border-bottom: 1px solid rgba(0,0,0,0.3);
            padding-bottom: 2px;
            transition: gap 0.2s;
        }
        .p-cta a:hover { gap: 12px; }

        /* ── Post footer / back bar ── */
        .p-post-footer {
            border-top: 1px solid var(--p-border);
            padding: 40px 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }
        .p-share {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .p-share-label {
            font-family: var(--p-display);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--p-muted);
        }
        .p-share-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--p-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--p-muted);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }
        .p-share-btn:hover { background: var(--p-accent); border-color: var(--p-accent); color: #000; }

        /* ── Error state ── */
        .p-error {
            padding: 160px 48px 80px;
            text-align: center;
        }
        .p-error h2 {
            font-family: var(--p-display);
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--p-text);
            margin-bottom: 12px;
        }
        .p-error p { font-family: var(--p-body); font-size: 15px; color: var(--p-muted); margin-bottom: 32px; }
        .p-error a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--p-display);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 28px;
            border: 1px solid var(--p-border);
            color: var(--p-text);
            text-decoration: none;
            border-radius: 100px;
            transition: all 0.2s;
        }
        .p-error a:hover { background: var(--p-accent); border-color: var(--p-accent); color: #000; }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .p-body-wrap { grid-template-columns: 1fr; gap: 48px; padding: 56px 36px; }
            .p-sidebar { position: static; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
            .p-sidebar-block, .p-cta { margin-bottom: 0; }
            .p-hero-content { padding: 0 36px 40px; }
            .p-hero-noimg { padding: 100px 36px 44px; }
            .p-post-footer { padding: 32px 36px; }
        }
        @media (max-width: 768px) {
            .p-hero-img { height: clamp(220px, 50vw, 340px); }
            .p-hero-content { padding: 0 20px 32px; }
            .p-hero-noimg { padding: 90px 20px 36px; }
            .p-post-title { font-size: clamp(26px, 7vw, 40px); }
            .p-body-wrap { padding: 40px 20px; gap: 36px; }
            .p-sidebar { grid-template-columns: 1fr; }
            .p-article { font-size: 15px; line-height: 1.8; }
            .p-post-footer { padding: 28px 20px; flex-direction: column; align-items: flex-start; }
            .p-back { margin-bottom: 20px; }
        }
        @media (max-width: 480px) {
            .p-hero-img { height: 200px; }
            .p-post-title { font-size: clamp(22px, 8vw, 32px); }
            .p-body-wrap { padding: 28px 16px; }
            .p-hero-content { padding: 0 16px 24px; }
            .p-hero-noimg { padding: 80px 16px 28px; }
            .p-article { font-size: 14px; }
            .p-article h2 { font-size: 20px; }
            .p-article h3 { font-size: 17px; }
            .p-post-footer { padding: 24px 16px; }
            .p-meta-row { gap: 12px; }
        }
    </style>
</head>

    <!-- ══ Sanity Post Loader ══ -->
    <script type="module">
        import { projectId, dataset, apiVersion, urlFor } from './sanity-config.js';

        function fmtDate(d) {
            if (!d) return '';
            return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // Portable Text → HTML renderer
        function renderPortableText(blocks) {
            if (!blocks || !blocks.length) return '';
            return blocks.map(block => {
                if (block._type === 'image') {
                    const src = urlFor(block);
                    return `<img src="${src}" alt="${block.alt || ''}" loading="lazy">`;
                }
                if (block._type !== 'block') return '';

                const text = (block.children || []).map(child => {
                    let t = child.text || '';
                    // Apply marks
                    if (child.marks && child.marks.length) {
                        child.marks.forEach(mark => {
                            if (mark === 'strong') t = `<strong>${t}</strong>`;
                            else if (mark === 'em') t = `<em>${t}</em>`;
                            else if (mark === 'code') t = `<code>${t}</code>`;
                            else if (mark === 'underline') t = `<u>${t}</u>`;
                        });
                    }
                    return t;
                }).join('');

                const style = block.style || 'normal';
                if (style === 'h2') return `<h2>${text}</h2>`;
                if (style === 'h3') return `<h3>${text}</h3>`;
                if (style === 'h4') return `<h4>${text}</h4>`;
                if (style === 'blockquote') return `<blockquote><p>${text}</p></blockquote>`;
                if (block.listItem === 'bullet') return `<li>${text}</li>`;
                if (block.listItem === 'number') return `<li>${text}</li>`;
                if (!text.trim()) return '<hr>';
                return `<p>${text}</p>`;
            }).join('\n');
        }

        async function loadPost() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            if (!slug) { showError('No post specified.'); return; }

            try {
                const query = `*[_type == "post" && slug.current == "${slug}"][0]{
                    _id, title, slug, content, excerpt, mainImage, tags, publishedAt, author
                }`;
                const res = await fetch(
                    `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${encodeURIComponent(query)}`
                );
                if (!res.ok) throw new Error('API ' + res.status);
                const data = await res.json();
                if (!data.result) { showError('Post not found.'); return; }
                renderPost(data.result);
            } catch (err) {
                console.error(err);
                showError('Failed to load post.');
            }
        }

        function showError(msg) {
            document.getElementById('post-root').innerHTML = `
                <div class="p-error">
                    <h2>Oops.</h2>
                    <p>${msg}</p>
                    <a href="/Blogs">← Back to all articles</a>
                </div>`;
        }

        function renderPost(post) {
            // Update page meta
            document.title = `${post.title} | WebCraftio`;
            document.getElementById('post-title').textContent = document.title;
            document.getElementById('post-description').content = post.excerpt || post.title;

            const imgUrl   = post.mainImage ? urlFor(post.mainImage) : '';
            const tags     = post.tags || [];
            const date     = fmtDate(post.publishedAt);
            const author   = post.author || 'WebCraftio';
            const bodyHtml = renderPortableText(post.content);
            const pageUrl  = encodeURIComponent(window.location.href);
            const pageTitle = encodeURIComponent(post.title);

            let html = '';

            // ── Hero ──
            if (imgUrl) {
                html += `
                <div class="p-hero">
                    <div class="p-hero-img">
                        <img src="${imgUrl}" alt="${post.title}" loading="eager">
                        <div class="p-hero-img-overlay"></div>
                    </div>
                    <div class="p-hero-content">
                        <a href="/Blogs" class="p-back">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                            All Articles
                        </a>
                        <div class="p-tag-row">
                            ${tags.map(t => `<span class="p-tag">${t}</span>`).join('')}
                        </div>
                        <h1 class="p-post-title">${post.title}</h1>
                        <div class="p-meta-row">
                            ${date ? `<span class="p-meta-item">${date}</span>` : ''}
                            ${date && author ? `<span class="p-meta-dot"></span>` : ''}
                            ${author ? `<span class="p-meta-item">${author}</span>` : ''}
                        </div>
                    </div>
                </div>`;
            } else {
                html += `
                <div class="p-hero-noimg">
                    <a href="/Blogs" class="p-back">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        All Articles
                    </a>
                    <div class="p-tag-row">
                        ${tags.map(t => `<span class="p-tag">${t}</span>`).join('')}
                    </div>
                    <h1 class="p-post-title">${post.title}</h1>
                    <div class="p-meta-row">
                        ${date ? `<span class="p-meta-item">${date}</span>` : ''}
                        ${date && author ? `<span class="p-meta-dot"></span>` : ''}
                        ${author ? `<span class="p-meta-item">${author}</span>` : ''}
                    </div>
                </div>`;
            }

            // ── Body + Sidebar ──
            html += `
            <div class="p-body-wrap">
                <article class="p-article">${bodyHtml || `<p>${post.excerpt || ''}</p>`}</article>
                <aside class="p-sidebar">
                    ${tags.length ? `
                    <div class="p-sidebar-block">
                        <div class="p-sidebar-label">Topics</div>
                        <div class="p-sidebar-tags">
                            ${tags.map(t => `<span class="p-sidebar-tag">${t}</span>`).join('')}
                        </div>
                    </div>` : ''}
                    <div class="p-cta">
                        <h4>Grow your store with WebCraftio</h4>
                        <p>Expert Shopify strategy, custom dev & AI solutions for ambitious brands.</p>
                        <a href="https://fire.chilipiper.com/me/abdullah-aslam/consultation">
                            Book a free call →
                        </a>
                    </div>
                    <div class="p-sidebar-block">
                        <div class="p-sidebar-label">Published</div>
                        <div style="font-family:var(--p-body);font-size:13px;color:var(--p-text)">${date || '—'}</div>
                    </div>
                </aside>
            </div>`;

            // ── Post footer ──
            html += `
            <div class="p-post-footer">
                <a href="/Blogs" class="p-back" style="margin-bottom:0">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back to all articles
                </a>
                <div class="p-share">
                    <span class="p-share-label">Share</span>
                    <a class="p-share-btn" href="https://twitter.com/intent/tweet?url=${pageUrl}&text=${pageTitle}" target="_blank" title="Twitter/X">𝕏</a>
                    <a class="p-share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url=${pageUrl}" target="_blank" title="LinkedIn">in</a>
                    <a class="p-share-btn" href="https://www.facebook.com/sharer/sharer.php?u=${pageUrl}" target="_blank" title="Facebook">f</a>
                </div>
            </div>`;

            document.getElementById('post-root').innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', loadPost);
    </script>

</body>
</html>
