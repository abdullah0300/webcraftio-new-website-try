    <!-- Sanity Blog Post Loader -->
    <script type="module">
        import { projectId, dataset, apiVersion, urlFor } from './sanity-config.js';

        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');

            if (!slug) {
                document.getElementById('loading-post').textContent = 'Post not found.';
                return;
            }

            try {
                const query = `*[_type == "post" && slug.current == "${slug}"][0]{
                    _id,
                    title,
                    slug,
                    content,
                    excerpt,
                    mainImage,
                    tags,
                    publishedAt,
                    author
                }`;

                const response = await fetch(
                    `https://${projectId}.api.sanity.io/v${apiVersion}/data/query/${dataset}?query=${encodeURIComponent(query)}`
                );

                if (!response.ok) {
                    throw new Error('Failed to fetch post');
                }

                const data = await response.json();
                renderPost(data.result);
            } catch (error) {
                console.error('Error loading post:', error);
                document.getElementById('loading-post').textContent = 'Error loading post. Please try again later.';
            }
        }

        function renderPost(post) {
            const postContent = document.getElementById('post-content');
            postContent.innerHTML = '';

            if (!post) {
                postContent.innerHTML = '<div style="text-align: center;">Post not found.</div>';
                return;
            }

            // Update page title and meta
            if (post && post.title) {
                document.title = `${post.title} | WebCraftio`;
                const postTitleEl = document.getElementById('post-title');
                const postDescEl = document.getElementById('post-description');
                if (postTitleEl) postTitleEl.textContent = `${post.title} | WebCraftio`;
                if (postDescEl) postDescEl.content = post.excerpt || post.title;
            }

            // Render post content
            const imageUrl = post.mainImage ? urlFor(post.mainImage) : '';
            const tags = post.tags && post.tags.length > 0 ? post.tags.join(', ') : '';
            const publishDate = post.publishedAt ? new Date(post.publishedAt).toLocaleDateString() : '';

            let html = `
                <article class="blog-post-full">
                    ${imageUrl ? `<div class="post-hero-image"><img src="${imageUrl}" alt="${post.title}" style="max-width: 100%; height: auto;"></div>` : ''}
                    <div class="post-meta" style="margin: 20px 0; color: #ccc;">
                        ${tags ? `<span class="post-tags">Tags: ${tags}</span>` : ''}
                        ${publishDate ? `<span class="post-date">Published: ${publishDate}</span>` : ''}
                        ${post.author ? `<span class="post-author">By: ${post.author}</span>` : ''}
                    </div>
                    <h1 style="color: white; margin-bottom: 30px;">${post.title}</h1>
            `;

            if (post.content && post.content.length > 0) {
                html += '<div class="post-content">';
                post.content.forEach(block => {
                    if (block._type === 'block') {
                        html += `<p style="color: white; line-height: 1.6; margin-bottom: 20px;">${block.children ? block.children.map(child => child.text).join('') : ''}</p>`;
                    }
                });
                html += '</div>';
            }

            html += `
                    <div style="margin-top: 50px; text-align: center;">
                        <a href="/Blogs" class="read-more" style="display: inline-block; padding: 15px 30px; background: #007bff; color: white; text-decoration: none; border-radius: 5px;">← Back to Blogs</a>
                    </div>
                </article>
            `;

            postContent.innerHTML = html;
        }

        // Load post when page loads
        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
